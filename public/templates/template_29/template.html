<!DOCTYPE html>\n<html data-tb-snip-trigger-v1="1" lang="en"><head></head><body>\n\n\n\n\n\n\n\n\n


  <meta charset="UTF-8">
  <meta name="viewport" content="width=794, initial-scale=1.0">
  <title>The Daily Slay Template</title>
  <style>
    :root {
      --paper-bg: #e9e9e9;
      --ink-color: #111;
      --font-serif: serif; /* or 'Playfair Display' if available */
      --font-sans: sans-serif;
      --font-gothic: serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #ccc;
      font-family: var(--font-serif);
      color: var(--ink-color);
       
      overflow: hidden;
    }

    .poster-scale-container {
      width: 794px; height: 1123px; overflow: hidden;
      background: var(--paper-bg);
      border: 1px solid #d8d4c9;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      padding: 30px 40px;
      display: flex; flex-direction: column; 
      margin: 0 auto;
     position: absolute; top: 0; left: 0; right: 0; margin: 0 auto;}

    /* Simulate subtle crumpled paper texture with radial gradients */
    .poster-scale-container::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0,0,0,0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(0,0,0,0.02) 0%, transparent 40%),
        radial-gradient(circle at 50% 10%, rgba(255,255,255,0.3) 0%, transparent 60%);
      pointer-events: none;
      z-index: 100;
    }

    [data-editable="text"] { outline: none; cursor: text; transition: background-color 0.2s ease; position: relative; z-index: 105; }
    [data-editable="text"]:hover { background-color: rgba(17, 17, 17, 0.05); border-radius: 2px; }
    [data-editable="text"]:focus { background-color: rgba(17, 17, 17, 0.08); border-radius: 2px; }

    /* Breaking News top */
    .breaking-news {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .breaking-news-text {
      font-family: sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1px;
      margin: 0 10px;
    }
    .breaking-news-line {
      flex-grow: 1;
      height: 1px;
      background-color: var(--ink-color);
    }
    /* Don't let lines touch the absolute edges */
    .breaking-news-line:first-child { margin-left: 20px; }
    .breaking-news-line:last-child { margin-right: 20px; }

    /* Header Block */
    .header-block {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    .header-side {
      font-size: 20px;
      font-style: italic;
      line-height: 1;
      width: 140px;
      letter-spacing: -0.5px;
    }
    .header-side.right {
      text-align: right;
    }
    .main-title {
      font-family: var(--font-gothic);
      font-size: 76px;
      line-height: 0.9;
      text-align: center;
      flex-grow: 1;
    }

    /* Lines */
    .double-line {
      border-top: 1px solid var(--ink-color);
      border-bottom: 2px solid var(--ink-color);
      height: 5px;
      margin-bottom: 5px;
    }
    .thin-line {
      border-bottom: 1px solid var(--ink-color);
      margin-top: 15px;
      margin-bottom: 15px;
    }

    /* Date */
    .date-text {
      text-align: right;
      font-size: 12px;
      font-style: italic;
      margin-bottom: 15px;
    }

    /* Headlines */
    .headline-1 {
      font-size: 68px;
      line-height: 1.1;
      letter-spacing: -2px;
      display: flex;
      align-items: baseline;
      gap: 15px;
    }
    .headline-1 .italic-part {
      font-style: italic;
    }
    .headline-1 .gothic-part {
      font-family: var(--font-gothic);
      font-size: 80px; /* Slightly larger to match baseline visually */
      transform: translateY(5px);
    }
    .headline-2 {
      font-size: 56px;
      line-height: 0.8;
      letter-spacing: -3px;
      transform: scaleY(1.3);
      transform-origin: top left;
      margin-top: 10px;
      margin-bottom: 30px; /* Extra margin to account for scale */
    }

    /* Main Image */
    .main-image-container {
      width: 100%;
      flex-grow: 1;
      position: relative;
    }
    .image-upload-box {
      width: 100%; height: 100%;
      background-color: #d0d0d0;
      cursor: pointer; overflow: hidden; position: absolute;
    }
    .image-file-input { display: none; }
    .image-preview-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    .image-preview {
      width: 100%; height: 100%; background-size: cover; background-position: center; background-repeat: no-repeat;
       /* Give it a slightly vintage feel */
      display: block;
    }
    .image-upload-box::after {
      content: 'UPLOAD PHOTO'; position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.2);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-sans); font-size: 18px; letter-spacing: 2px;
      opacity: 0; transition: opacity 0.2s ease; z-index: 5;
    }
    .image-upload-box:hover::after { opacity: 1; }
    .placeholder-state {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; z-index: 2;
    }
    .image-upload-box.has-image .placeholder-state { display: none; }

    @media print {
      body { background: #fff; }
      .image-upload-box::after, .image-file-input { display: none !important; }
      .poster-scale-container { transform: none !important; width: 210mm !important; height: 297mm !important; box-shadow: none !important; border: none !important;  margin: 0 auto;  position: absolute; top: 0; left: 0; right: 0; margin: 0 auto;}
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
