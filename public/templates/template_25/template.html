<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=794, initial-scale=1.0">
  <title>Vogue Italia B&W Template</title>
  <style>
    :root {
      --paper-bg: #111;
      --text-color: #dcdcdc; /* Slightly muted white */
      --font-serif: serif;
      --font-sans: sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #333;
      font-family: var(--font-serif);
       
      overflow-x: hidden;
    }

    .poster-scale-container {
      width: 794px; height: 1123px; overflow: hidden;
      background: var(--paper-bg);
      border: 1px solid #d8d4c9;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      position: relative;
      margin: 0 auto;
    }

    [data-editable="text"] { outline: none; cursor: text; transition: background-color 0.2s ease; }
    [data-editable="text"]:hover { background-color: rgba(255, 255, 255, 0.15); border-radius: 2px; }
    [data-editable="text"]:focus { background-color: rgba(255, 255, 255, 0.3); border-radius: 2px; }

    /* Background Image (Full Bleed) */
    .image-upload-box {
      width: 100%; height: 100%;
      background-color: #111;
      cursor: pointer; overflow: hidden; position: absolute;
      top: 0; left: 0; z-index: 1;
    }
    .image-file-input { display: none; }
    .image-preview-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    .image-preview {
      width: 100%; height: 100%; background-size: cover; background-position: center; background-repeat: no-repeat;
      
      display: block;
    }
    .image-upload-box::after {
      content: 'CLICK TO UPLOAD COVER PHOTO'; position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.3);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-sans); font-size: 16px; letter-spacing: 2px;
      opacity: 0; transition: opacity 0.2s ease; z-index: 5;
    }
    .image-upload-box:hover::after { opacity: 1; }
    .placeholder-state {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center; color: #777; z-index: 2;
    }
    .image-upload-box.has-image .placeholder-state { display: none; }

    /* Text Overlays Layer */
    .text-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10;
      pointer-events: none;
      color: var(--text-color);
    }
    .text-layer [data-editable] {
      pointer-events: auto;
    }

    /* Main Title */
    .main-title-container {
      position: absolute;
      top: 15px;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 5;
    }
    .main-title {
      font-family: var(--font-serif);
      font-size: 216px;
      line-height: 0.8;
      letter-spacing: -3px;
      transform: scaleY(1.1);
    }
    .main-title-sub {
      position: absolute;
      top: 120px;
      left: 45%;
      font-family: var(--font-serif);
      font-size: 22px;
      letter-spacing: 2px;
    }

    /* Top Left Info */
    .top-left-info {
      position: absolute;
      top: 240px;
      left: 50px;
    }
    .info-line {
      font-family: sans-serif;
      font-size: 18px;
      line-height: 1.4;
      letter-spacing: 1px;
    }

    /* Right Block */
    .right-quote-block {
      position: absolute;
      top: 260px;
      right: 50px;
      width: 320px;
      text-align: center;
    }
    .quote-line {
      font-size: 34px;
      line-height: 1.3;
    }
    .quote-caps {
      text-transform: uppercase;
      font-size: 36px;
    }

    /* Bottom Text */
    .bottom-name {
      position: absolute;
      bottom: 50px;
      width: 100%;
      text-align: center;
    }
    .name-text {
      font-family: var(--font-serif);
      font-size: 112px;
      line-height: 0.8;
      letter-spacing: 35px;
      margin-right: -35px; /* Offset letter spacing for centering */
    }

    @media print {
      body { background: #fff; }
      .image-upload-box::after, .image-file-input { display: none !important; }
      .poster-scale-container { transform: none !important; width: 210mm !important; height: 297mm !important; box-shadow: none !important; border: none !important;  margin: 0 auto; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>
  <article class="poster-scale-container">
    
    <!-- Background Image -->
    <div class="image-upload-box" id="main-image-box" data-editable="image">
      <input type="file" id="main-image-input" class="image-file-input" accept="image/*">
      <div class="image-preview-container">
        <div id="main-image-img" class="image-preview" ></div>
      </div>
      <div class="placeholder-state">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor" style="opacity: 0.6; margin-bottom: 10px;">
          <circle cx="12" cy="12" r="3.2"/>
          <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
        </svg>
        <span style="font-family: var(--font-sans); font-size: 14px; letter-spacing: 2px;">UPLOAD COVER PHOTO</span>
      </div>
    </div>

    <!-- Text Overlays -->
    <div class="text-layer">
      
      <div class="main-title-container">
        <div class="main-title" id="main-title" data-editable="text">VOGUE</div>
        <div class="main-title-sub" id="main-title-sub" data-editable="text">ITALIA</div>
      </div>

      <div class="top-left-info">
        <div class="info-line" id="tl-1" data-editable="text">MAY</div>
        <div class="info-line" id="tl-2" data-editable="text">2025</div>
        <div class="info-line" id="tl-3" data-editable="text">№ 367</div>
      </div>

      <div class="right-quote-block">
        <div class="quote-line" id="q-1" data-editable="text">"Più sono</div>
        <div class="quote-line" id="q-2" data-editable="text"><span class="quote-caps">ONESTA</span> quando</div>
        <div class="quote-line" id="q-3" data-editable="text">faccio <span class="quote-caps">MUSICA</span>,</div>
        <div class="quote-line" id="q-4" data-editable="text">più entro in</div>
        <div class="quote-line" id="q-5" data-editable="text">sintonia con le</div>
        <div class="quote-line" id="q-6" data-editable="text"><span class="quote-caps">PERSONE</span>"</div>
      </div>

      <div class="bottom-name">
        <div class="name-text" id="name" data-editable="text">DARCY</div>
      </div>

    </div>

  </article>
</body>
</html>
