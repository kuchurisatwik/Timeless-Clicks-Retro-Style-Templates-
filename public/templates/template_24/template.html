<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=794, initial-scale=1.0">
  <title>Vogue It Girl Template</title>
  <style>
    :root {
      --paper-bg: #fff;
      --font-serif: serif;
      --font-sans: sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #333;
      font-family: var(--font-sans);
       
      overflow-x: hidden;
    }

    .poster-scale-container {
      width: 794px; height: 1123px; overflow: hidden;
      background: var(--paper-bg);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      position: relative;
      margin: 0 auto;
      border: 15px solid #000; /* Black frame */
    }

    [data-editable="text"] { outline: none; cursor: text; transition: background-color 0.2s ease; }
    [data-editable="text"]:hover { background-color: rgba(255, 255, 255, 0.15); border-radius: 2px; }
    [data-editable="text"]:focus { background-color: rgba(255, 255, 255, 0.3); border-radius: 2px; }

    /* Background Image (Full Bleed behind frame) */
    .image-upload-box {
      width: 100%; height: 100%;
      background-color: #888;
      cursor: pointer; overflow: hidden; position: absolute;
      top: 0; left: 0; z-index: 1;
    }
    .image-file-input { display: none; }
    .image-preview-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    .image-preview {
      width: 100%; height: 100%; background-size: cover; background-position: center; background-repeat: no-repeat;
      
      display: block;
    }
    .image-upload-box::after {
      content: 'CLICK TO UPLOAD COVER PHOTO'; position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.2);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-sans); font-size: 16px; letter-spacing: 2px;
      opacity: 0; transition: opacity 0.2s ease; z-index: 5;
    }
    .image-upload-box:hover::after { opacity: 1; }
    .placeholder-state {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; z-index: 2;
    }
    .image-upload-box.has-image .placeholder-state { display: none; }

    /* Text Overlays Layer */
    .text-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10;
      pointer-events: none;
    }
    .text-layer [data-editable] {
      pointer-events: auto;
    }

    /* Main Title */
    .main-title-container {
      position: absolute;
      top: -20px;
      left: 0;
      width: 100%;
      text-align: center;
      z-index: 5; /* So it can be masked by subject */
    }
    .main-title {
      font-family: var(--font-serif);
      font-size: 208px;
      line-height: 0.8;
      letter-spacing: -2px;
      transform: scaleY(1.1);
      color: #000;
    }

    /* Right Block (Top) */
    .it-girl-block {
      position: absolute;
      top: 220px;
      right: 30px;
      text-align: right;
      color: #000;
    }
    .it-girl-text {
      font-family: var(--font-serif);
      font-size: 120px;
      line-height: 0.8;
      letter-spacing: -4px;
    }

    /* Right Block (Middle) */
    .right-mid-block {
      position: absolute;
      top: 600px;
      right: 30px;
      text-align: right;
      color: #fff;
    }
    .headline-bold-right {
      font-size: 42px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }
    .subtext-right {
      font-family: sans-serif;
      font-size: 16px;
      line-height: 1.4;
      text-transform: uppercase;
    }

    /* Left Block (Bottom) */
    .left-bot-block {
      position: absolute;
      bottom: 150px;
      left: 30px;
      text-align: left;
      color: #fff;
    }
    .headline-bold-left {
      font-size: 48px;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 10px;
    }
    .subtext-left {
      font-family: sans-serif;
      font-size: 18px;
      line-height: 1.4;
      text-transform: uppercase;
    }

    /* Bottom Center Name */
    .bottom-center {
      position: absolute;
      bottom: 40px;
      width: 100%;
      text-align: center;
      color: #fff;
    }
    .name-text {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    /* Small watermark */
    .watermark {
      position: absolute;
      bottom: 120px;
      right: 90px;
      color: #fff;
      font-family: sans-serif;
      font-size: 12px;
      transform: rotate(90deg);
      transform-origin: left top;
    }

    @media print {
      body { background: #fff; }
      .image-upload-box::after, .image-file-input { display: none !important; }
      .poster-scale-container { transform: none !important; width: 210mm !important; height: 297mm !important; box-shadow: none !important; border: 15px solid #000 !important;  margin: 0 auto; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>
  <article class="poster-scale-container">
    
    <!-- Background Image -->
    <div class="image-upload-box" id="main-image-box" data-editable="image">
      <input type="file" id="main-image-input" class="image-file-input" accept="image/*">
      <div class="image-preview-container">
        <div id="main-image-img" class="image-preview" ></div>
      </div>
      <div class="placeholder-state">
        <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor" style="opacity: 0.6; margin-bottom: 10px;">
          <circle cx="12" cy="12" r="3.2"/>
          <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
        </svg>
        <span style="font-family: var(--font-sans); font-size: 14px; letter-spacing: 2px;">UPLOAD COVER PHOTO</span>
      </div>
    </div>

    <!-- Text Overlays -->
    <div class="text-layer">
      
      <div class="main-title-container">
        <div class="main-title" id="main-title" data-editable="text">VOGUE</div>
      </div>

      <div class="it-girl-block">
        <div class="it-girl-text" id="ig-1" data-editable="text">IT</div>
        <div class="it-girl-text" id="ig-2" data-editable="text">GIRL</div>
      </div>

      <div class="right-mid-block">
        <div class="headline-bold-right" id="rm-1" data-editable="text">HOUSE TOUR</div>
        <div class="subtext-right" id="rm-2" data-editable="text">
          ALL OF HER BEHIND THE SCENE IN THE<br>
          MAKING OF HER NEW ALBUM WITH<br>
          EXCLUSIVE INFORMATION
        </div>
      </div>

      <div class="left-bot-block">
        <div class="headline-bold-left" id="lb-1" data-editable="text">SHE'S WORKING LATE</div>
        <div class="subtext-left" id="lb-2" data-editable="text">
          HER NEW ALBUM MAN'S BEST FRIEND<br>
          OUT AUGUST 29TH AFTER ONLY A<br>
          YEAR OF SHORT N' SWEET
        </div>
      </div>

      <div class="bottom-center">
        <div class="name-text" id="name" data-editable="text">SABRINA CARPENTER</div>
      </div>
      
      <div class="watermark" id="watermark" data-editable="text">leeloupqi</div>

    </div>

  </article>
</body>
</html>
