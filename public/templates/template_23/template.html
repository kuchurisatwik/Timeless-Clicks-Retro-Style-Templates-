<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=794, initial-scale=1.0">
  <title>Breaking News Save the Date Template</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --paper-bg: #ffffff;
      --ink-color: #1a1a1a;
      --font-serif: serif;
      --font-sans: sans-serif;
      --font-gothic: serif;
      --font-script: 'Great Vibes', cursive;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #f0f0f0;
      font-family: var(--font-serif);
      color: var(--ink-color);
      display: flex; justify-content: center;
      overflow-x: hidden;
    }

    .poster-scale-container {
      width: 794px; height: 1123px; overflow: hidden;
      background: var(--paper-bg);
      border: 1px solid #d8d4c9;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      padding: 40px;
      display: flex; flex-direction: column; position: relative;
      margin: 0 auto;
    }

    [data-editable="text"] { outline: none; cursor: text; transition: background-color 0.2s ease; }
    [data-editable="text"]:hover { background-color: rgba(26, 26, 26, 0.04); border-radius: 2px; }
    [data-editable="text"]:focus { background-color: rgba(26, 26, 26, 0.07); border-radius: 2px; }

    /* Top Header Section */
    .top-header-box {
      border-top: 1.5px solid var(--ink-color);
      border-bottom: 1.5px solid var(--ink-color);
      display: grid;
      grid-template-columns: 1fr 2.2fr 1fr;
      align-items: center;
      padding: 15px 0;
      margin-bottom: 5px;
    }
    .header-side {
      font-size: 15px;
      line-height: 1.4;
      text-align: center;
    }
    .header-side.left { border-right: 1.5px solid var(--ink-color); padding-right: 10px; }
    .header-side.right { border-left: 1.5px solid var(--ink-color); padding-left: 10px; }
    
    .header-center {
      text-align: center;
      font-family: var(--font-gothic);
      font-size: 65px;
      line-height: 0.9;
    }

    /* Lines */
    .double-line {
      border-top: 2px solid var(--ink-color);
      border-bottom: 1px solid var(--ink-color);
      height: 6px;
      margin: 10px 0;
    }
    .double-line-thin {
      border-top: 1px solid var(--ink-color);
      border-bottom: 1px solid var(--ink-color);
      height: 5px;
      margin: 10px 0;
    }

    /* Headline Section */
    .headline-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 30px;
      margin: 20px 0 10px;
    }
    .headline-text {
      font-family: var(--font-sans);
      font-size: 110px;
      line-height: 0.8;
      transform: scaleY(1.4);
      letter-spacing: -2px;
      font-weight: 700;
    }
    .headline-mid-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      transform: translateY(10px);
    }
    .headline-mid-line {
      width: 60px;
      height: 3px;
      border-top: 1.5px solid var(--ink-color);
      border-bottom: 1.5px solid var(--ink-color);
    }
    .headline-mid-text {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 2px;
    }

    /* Date Row */
    .date-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: 15px 0;
    }
    .date-text {
      font-family: var(--font-serif);
      font-size: 26px;
      letter-spacing: 1px;
    }
    .date-line {
      flex-grow: 1;
      height: 1.5px;
      background-color: var(--ink-color);
    }

    /* Image Section */
    .image-container {
      width: 100%;
      height: 400px;
      margin: 20px 0;
      position: relative;
    }
    .image-upload-box {
      width: 100%; height: 100%;
      background-color: #e0e0e0;
      cursor: pointer; overflow: hidden; position: absolute;
      border-radius: 14px;
    }
    .image-file-input { display: none; }
    .image-preview-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    .image-preview {
      width: 100%; height: 100%; object-fit: cover;
      display: block;
    }
    .image-upload-box::after {
      content: 'CLICK TO UPLOAD PHOTO'; position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; background-color: rgba(26, 26, 26, 0.4);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-sans); font-size: 14px; letter-spacing: 2px;
      opacity: 0; transition: opacity 0.2s ease; z-index: 5;
    }
    .image-upload-box:hover::after { opacity: 1; }
    .placeholder-state {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; z-index: 2;
    }
    .image-upload-box.has-image .placeholder-state { display: none; }

    /* Bottom Section */
    .bottom-title {
      text-align: center;
      font-family: var(--font-sans);
      font-size: 70px;
      line-height: 1;
      font-weight: 700;
      margin-top: 10px;
    }

    .bottom-script-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-top: 10px;
    }
    .script-text {
      font-family: var(--font-script);
      font-size: 65px;
      line-height: 1;
      margin-top: -10px;
    }
    .script-line {
      width: 80px;
      height: 1px;
      background-color: var(--ink-color);
    }

    @media print {
      body { background: #fff; }
      .image-upload-box::after, .image-file-input { display: none !important; }
      .poster-scale-container { transform: none !important; width: 210mm !important; height: 297mm !important; box-shadow: none !important; border: none !important; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>
  <article class="poster-scale-container">
    
    <div class="top-header-box">
      <div class="header-side left" id="meta-left" data-editable="text">
        Morgan Collins &<br>Taylor Smith
      </div>
      <div class="header-center" id="site-title" data-editable="text">
        Breaking News
      </div>
      <div class="header-side right" id="meta-right" data-editable="text">
        Friday,<br>15 October 2025
      </div>
    </div>

    <div class="double-line-thin"></div>

    <div class="headline-row">
      <div class="headline-text" id="headline-part-1" data-editable="text">SAVE</div>
      <div class="headline-mid-container">
        <div class="headline-mid-line"></div>
        <div class="headline-mid-text" id="headline-part-2" data-editable="text">THE</div>
        <div class="headline-mid-line"></div>
      </div>
      <div class="headline-text" id="headline-part-3" data-editable="text">DATE</div>
    </div>

    <div class="double-line-thin"></div>

    <div class="date-row">
      <div class="date-line"></div>
      <div class="date-text" id="main-date" data-editable="text">FRIDAY, 15 OCTOBER 2025</div>
      <div class="date-line"></div>
    </div>

    <div class="double-line"></div>

    <div class="image-container">
      <div class="image-upload-box" id="main-image-box" data-editable="image">
        <input type="file" id="main-image-input" class="image-file-input" accept="image/*">
        <div class="image-preview-container">
          <img id="main-image-img" class="image-preview" src="" alt="Couple Photo">
        </div>
        <div class="placeholder-state">
          <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor" style="opacity: 0.5; margin-bottom: 10px;">
            <circle cx="12" cy="12" r="3.2"/>
            <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
          </svg>
          <span style="font-family: var(--font-sans); font-size: 14px; letter-spacing: 2px;">UPLOAD PHOTO</span>
        </div>
      </div>
    </div>

    <div class="double-line-thin" style="margin-bottom: 15px;"></div>

    <div class="bottom-title" id="names-text" data-editable="text">
      MORGAN & TYLER
    </div>

    <div class="bottom-script-row">
      <div class="script-line"></div>
      <div class="script-text" id="action-text" data-editable="text">Are Getting Married</div>
      <div class="script-line"></div>
    </div>

  </article>
</body>
</html>
