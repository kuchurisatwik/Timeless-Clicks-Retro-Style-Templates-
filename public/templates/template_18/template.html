<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=794, initial-scale=1.0">
  <title>Custom Newspaper Themed Save The Date</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --paper-bg: radial-gradient(circle at center, #f4f4f4 0%, #e6e6e6 100%);
      --paper-bg-fallback: #eeeeee;
      --ink-color: #1a1a1a;
      --font-serif: serif;
      --font-sans: sans-serif;
      --font-gothic: serif;
      --font-script: 'Great Vibes', cursive;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--paper-bg-fallback);
      background-image: var(--paper-bg);
      font-family: var(--font-serif);
      color: var(--ink-color);
      display: flex; justify-content: center;
      overflow-x: hidden;
    }

    .poster-scale-container {
      width: 794px; height: 1123px; overflow: hidden;
      background: var(--paper-bg);
      border: 1px solid #d8d4c9;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      padding: 50px;
      display: flex; flex-direction: column; position: relative;
      margin: 0 auto;
    }

    [data-editable="text"] { outline: none; cursor: text; transition: background-color 0.2s ease; }
    [data-editable="text"]:hover { background-color: rgba(26, 26, 26, 0.04); border-radius: 2px; }
    [data-editable="text"]:focus { background-color: rgba(26, 26, 26, 0.07); border-radius: 2px; }

    /* Top Header Section */
    .top-header-box {
      border: 2px solid var(--ink-color);
      border-left: none; border-right: none;
      display: grid;
      grid-template-columns: 1fr 2.5fr 1fr;
      align-items: center;
      padding: 15px 0;
    }
    .header-side {
      font-family: var(--font-serif);
      font-size: 18px;
      font-style: italic;
      text-transform: uppercase;
      letter-spacing: 1px;
      line-height: 1.4;
      text-align: center;
    }
    .header-side.left { border-right: 1.5px solid var(--ink-color); }
    .header-side.right { border-left: 1.5px solid var(--ink-color); }
    
    .header-center {
      text-align: center;
      font-family: var(--font-gothic);
      font-size: 78px;
      line-height: 0.9;
    }

    /* Sub Meta Section */
    .sub-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px;
      border-bottom: 2px solid var(--ink-color);
      font-family: var(--font-serif);
      font-size: 20px;
      font-style: italic;
      text-transform: uppercase;
    }
    .star-icon {
      font-style: normal;
      font-size: 16px;
    }

    /* Headline Section */
    .headline-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin: 30px 0;
    }
    .headline-text {
      font-family: var(--font-sans);
      font-size: 100px;
      line-height: 0.8;
      letter-spacing: -2px;
      transform: scaleY(1.1);
    }
    .headline-script {
      font-family: var(--font-script);
      font-size: 90px;
      line-height: 0.8;
      transform: translateY(-5px) rotate(-3deg);
    }

    /* Lines */
    .double-line-top {
      border-top: 5px solid var(--ink-color);
      border-bottom: 1.5px solid var(--ink-color);
      height: 12px;
      margin-bottom: 15px;
    }
    .double-line-bottom {
      border-top: 1.5px solid var(--ink-color);
      border-bottom: 5px solid var(--ink-color);
      height: 12px;
      margin-top: 15px;
    }

    /* Image Section */
    .image-container {
      width: 100%;
      height: 480px;
      position: relative;
    }
    .image-upload-box {
      width: 100%; height: 100%;
      background-color: #dfdfdf;
      cursor: pointer; overflow: hidden; position: absolute;
    }
    .image-file-input { display: none; }
    .image-preview-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    .image-preview {
      width: 100%; height: 100%; object-fit: cover;
      filter: grayscale(100%) contrast(1.15);
      display: block;
    }
    .image-upload-box::after {
      content: 'CLICK TO UPLOAD PHOTO'; position: absolute; top: 0; left: 0;
      width: 100%; height: 100%; background-color: rgba(26, 26, 26, 0.4);
      color: #fff; display: flex; align-items: center; justify-content: center;
      font-family: var(--font-sans); font-size: 14px; letter-spacing: 2px;
      opacity: 0; transition: opacity 0.2s ease; z-index: 5;
    }
    .image-upload-box:hover::after { opacity: 1; }
    .placeholder-state {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center; color: #555; z-index: 2;
    }
    .image-upload-box.has-image .placeholder-state { display: none; }

    /* Bottom Section */
    .bottom-title {
      text-align: center;
      font-family: var(--font-sans);
      font-size: 90px;
      line-height: 1;
      letter-spacing: -2px;
      transform: scaleY(1.1);
      margin-top: 25px;
    }

    .bottom-script {
      text-align: center;
      font-family: var(--font-script);
      font-size: 90px;
      line-height: 1;
      margin-top: 15px;
      transform: rotate(-3deg);
    }

    @media print {
      body { background: #fff; }
      .image-upload-box::after, .image-file-input { display: none !important; }
      .poster-scale-container { transform: none !important; width: 210mm !important; height: 297mm !important; box-shadow: none !important; border: none !important; }
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
    }
  </style>
</head>
<body>
  <article class="poster-scale-container">
    
    <div class="top-header-box">
      <div class="header-side left" id="meta-left" data-editable="text">
        SPECIAL<br>EDITION
      </div>
      <div class="header-center" id="site-title" data-editable="text">
        Wedding Post
      </div>
      <div class="header-side right" id="meta-right" data-editable="text">
        SPECIAL<br>EDITION
      </div>
    </div>

    <div class="sub-meta-row">
      <div id="sub-meta-1" data-editable="text">VOL 12, NO. 6</div>
      <div class="star-icon">✪</div>
      <div id="sub-meta-2" data-editable="text">SAVE THE DATE</div>
      <div class="star-icon">✪</div>
      <div id="sub-meta-3" data-editable="text">MAY 12TH, 2025</div>
    </div>

    <div class="headline-row">
      <div class="headline-text" id="headline-part-1" data-editable="text">SAVE</div>
      <div class="headline-script" id="headline-part-2" data-editable="text">the</div>
      <div class="headline-text" id="headline-part-3" data-editable="text">DATE</div>
    </div>

    <div class="double-line-top"></div>

    <div class="image-container">
      <div class="image-upload-box" id="main-image-box" data-editable="image">
        <input type="file" id="main-image-input" class="image-file-input" accept="image/*">
        <div class="image-preview-container">
          <img id="main-image-img" class="image-preview" src="" alt="Couple Photo">
        </div>
        <div class="placeholder-state">
          <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor" style="opacity: 0.5; margin-bottom: 10px;">
            <circle cx="12" cy="12" r="3.2"/>
            <path d="M9 2L7.17 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2h-3.17L15 2H9zm3 15c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5z"/>
          </svg>
          <span style="font-family: var(--font-sans); font-size: 14px; letter-spacing: 2px;">UPLOAD PHOTO</span>
        </div>
      </div>
    </div>

    <div class="double-line-bottom"></div>

    <div class="bottom-title" id="names-text" data-editable="text">
      MARY & ANDREW
    </div>

    <div class="bottom-script" id="action-text" data-editable="text">
      are getting married
    </div>

  </article>
</body>
</html>
